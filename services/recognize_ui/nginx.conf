# Phase 6.1 recognize-ui nginx config.
#
# Serves the static SPA at /, proxies /api/* and /health to the
# recognize-api container (resolved via the Compose service name).

server {
    listen 80;
    server_name _;

    # Static SPA assets.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
        # No cache while we iterate on the UI; tighten later.
        add_header Cache-Control "no-store" always;
    }

    # API + health pass-through. The trailing slash on proxy_pass
    # makes nginx strip the matching prefix before forwarding -- we
    # want /api/recognize to hit /api/recognize on the backend, so
    # we DON'T strip and use the full prefix on both sides.
    location /api/ {
        proxy_pass http://recognize-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 20M;
    }

    location = /health {
        proxy_pass http://recognize-api:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
