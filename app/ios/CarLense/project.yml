name: CarLense

options:
  bundleIdPrefix: com.ashzelazny
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Pillar: Core ML compiles .mlpackage at build time into Foo.mlmodelc inside the app bundle.
    # We don't compile manually; Xcode handles it from the resource added to the target.
    COREML_CODEGEN_LANGUAGE: Swift

targets:
  CarLense:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CarLense
        excludes:
          - "Resources/**"
      # Each resource is listed as its own source with buildPhase: resources.
      # .mlmodel / .mlpackage entries trigger Core ML's build-time compilation
      # to .mlmodelc inside the app bundle. (xcodegen's top-level `resources:`
      # field is silently ignored — only `sources` makes it into the pbxproj.)
      - path: CarLense/Resources/model.mlpackage
        buildPhase: resources
        optional: true
      - path: CarLense/Resources/YOLOv3Tiny.mlmodel
        buildPhase: resources
        optional: true
      - path: CarLense/Resources/prototypes.bin
        buildPhase: resources
        optional: true
      - path: CarLense/Resources/class_names.json
        buildPhase: resources
        optional: true
      - path: CarLense/Resources/preprocessing.json
        buildPhase: resources
        optional: true
    info:
      path: CarLense/Info.plist
      properties:
        CFBundleDisplayName: Car Lense
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        NSCameraUsageDescription: "Car Lense uses the camera to identify cars in real time."
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
          - video-camera
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ashzelazny.carlense
        PRODUCT_NAME: CarLense
        DEVELOPMENT_TEAM: "572T55Q5XS"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        ENABLE_BITCODE: NO
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
